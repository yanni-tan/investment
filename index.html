<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;0,9..40,900&display=swap" rel="stylesheet">
    <style>
        /* ── Variables ── */
        :root {
            --sidebar: #ffffff;
            --sidebar-border: rgba(0,0,0,0.07);
            --sidebar-text: #9ca3af;
            --sidebar-text-active: #111827;
            --bg: #ebebe6;
            --surface: #ffffff;
            --surface2: #f5f5f1;
            --label: #111827;
            --label2: #6b7280;
            --label3: #9ca3af;
            --sep: #e5e5e0;
            --accent: #c8ff00;
            --accent-dim: rgba(200,255,0,0.15);
            --green: #22c55e;
            --red: #ef4444;
            --green-bg: rgba(34,197,94,0.1);
            --red-bg: rgba(239,68,68,0.1);
            --blue: #3b82f6;
            --amber: #f59e0b;
            --purple: #8b5cf6;
            --radius: 20px;
            --radius-sm: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.07);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --sidebar-w: 240px;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --sidebar: #111827;
                --sidebar-border: rgba(255,255,255,0.06);
                --sidebar-text: #6b7280;
                --sidebar-text-active: #f9fafb;
                --bg: #0f172a;
                --surface: #1e293b;
                --surface2: #263350;
                --label: #f1f5f9;
                --label2: #94a3b8;
                --label3: #475569;
                --sep: #1e293b;
                --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 32px rgba(0,0,0,0.4);
            }
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', -apple-system, "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--label);
            -webkit-font-smoothing: antialiased;
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--sidebar);
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-right: 1px solid var(--sidebar-border);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 28px 20px 24px;
            border-bottom: 1px solid var(--sidebar-border);
        }

        .brand-icon {
            width: 34px; height: 34px;
            background: #111827;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 800;
            color: var(--accent);
        }

        .brand-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--sidebar-text-active);
            letter-spacing: -0.3px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .nav-section {
            font-size: 10px;
            font-weight: 700;
            color: var(--sidebar-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 8px;
            margin-bottom: 6px;
            margin-top: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--sidebar-text);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-family: inherit;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(0,0,0,0.05);
            color: var(--sidebar-text-active);
        }

        .nav-item.active {
            background: var(--accent);
            color: #111827;
        }

        .nav-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .nav-dot.all  { background: #94a3b8; }
        .nav-dot.us   { background: var(--blue); }
        .nav-dot.sg   { background: var(--amber); }
        .nav-dot.uk   { background: var(--purple); }

        .nav-item.active .nav-dot { opacity: 1; filter: brightness(0); }

        .sidebar-footer {
            padding: 16px 12px 24px;
            border-top: 1px solid var(--sidebar-border);
        }

        .sidebar-add {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            background: var(--accent);
            color: #111827;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.15s;
        }
        .sidebar-add:hover { opacity: 0.88; }
        .sidebar-add:active { opacity: 0.75; }

        .sidebar-utils {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .util-btn {
            flex: 1;
            padding: 7px;
            background: transparent;
            border: 1px solid var(--sidebar-border);
            border-radius: var(--radius-sm);
            color: var(--sidebar-text);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .util-btn:hover { background: rgba(0,0,0,0.05); color: var(--sidebar-text-active); }

        /* ── Main ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            padding: 32px 32px 60px;
            min-height: 100vh;
        }

        /* ── Page Header ── */
        .page-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .greeting {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1.1;
        }

        .greeting-sub {
            font-size: 14px;
            font-weight: 400;
            color: var(--label3);
            margin-top: 4px;
            letter-spacing: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .last-updated-text {
            font-size: 12px;
            color: var(--label3);
            text-align: right;
        }

        .icon-btn {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--sep);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: var(--shadow-sm);
            transition: opacity .15s;
        }
        .icon-btn:active { opacity: .7; }
        .icon-btn svg { width: 15px; height: 15px; fill: none; stroke: var(--label2); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── KPI Grid ── */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px 26px 22px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .kpi-card.total {
            background: #111827;
            color: #fff;
        }

        @media (prefers-color-scheme: dark) {
            .kpi-card.total { background: #0a0f1a; }
        }

        .kpi-icon {
            width: 32px; height: 32px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            margin-bottom: 18px;
        }

        .kpi-icon.green  { background: var(--accent-dim); }
        .kpi-icon.blue   { background: rgba(59,130,246,0.1); }
        .kpi-icon.red    { background: rgba(239,68,68,0.1); }
        .kpi-icon.total  { background: rgba(255,255,255,0.1); }

        .kpi-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--label3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .kpi-card.total .kpi-label { color: rgba(255,255,255,0.4); }

        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1.5px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .kpi-card.total .kpi-value { color: #fff; }

        .kpi-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .kpi-badge.up   { background: var(--green-bg); color: var(--green); }
        .kpi-badge.down { background: var(--red-bg); color: var(--red); }
        .kpi-badge.neu  { background: var(--surface2); color: var(--label2); }

        .kpi-card.total .kpi-badge.up   { background: rgba(34,197,94,0.2); color: #4ade80; }
        .kpi-card.total .kpi-badge.down { background: rgba(239,68,68,0.2); color: #f87171; }

        .kpi-sub {
            font-size: 11px;
            color: var(--label3);
            margin-top: 5px;
        }
        .kpi-card.total .kpi-sub { color: rgba(255,255,255,0.3); }

        /* ── Content Grid ── */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 288px;
            gap: 20px;
            align-items: start;
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--sep);
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .card-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .count-badge {
            font-size: 12px;
            color: var(--label2);
            background: var(--surface2);
            padding: 2px 9px;
            border-radius: 20px;
            border: 1px solid var(--sep);
        }

        /* ── Table ── */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }

        thead th {
            padding: 10px 16px;
            text-align: left;
            font-size: 10.5px;
            font-weight: 700;
            color: var(--label3);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            border-bottom: 1px solid var(--sep);
            white-space: nowrap;
        }

        th.r, td.r { text-align: right; }

        tbody tr {
            border-bottom: 1px solid var(--sep);
            transition: background .1s;
            cursor: default;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }
        tbody td { padding: 14px 16px; white-space: nowrap; vertical-align: middle; }

        .ticker-wrap { display: flex; align-items: center; gap: 12px; }

        .ticker-avatar {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--sep);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800;
            color: var(--label2);
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        .ticker-name { font-weight: 600; font-size: 13px; }
        .ticker-meta { font-size: 11px; color: var(--label2); margin-top: 1px; }

        .mkt-pill {
            display: inline-block;
            padding: 2px 8px; border-radius: 20px;
            font-size: 10px; font-weight: 700;
            letter-spacing: 0.3px;
        }

        .mkt-us  { background: rgba(59,130,246,0.1);  color: #3b82f6; }
        .mkt-sg  { background: rgba(245,158,11,0.1);  color: #d97706; }
        .mkt-uk  { background: rgba(139,92,246,0.1);  color: #7c3aed; }

        .price-cell { cursor: pointer; }
        .price-cell:hover { text-decoration: underline dotted var(--label3); }

        .manual-tag {
            display: inline-block;
            font-size: 9px; font-weight: 700;
            background: rgba(245,158,11,0.15); color: #d97706;
            border-radius: 4px; padding: 1px 4px;
            margin-left: 3px; vertical-align: middle;
        }

        .price-inline-input {
            width: 80px; padding: 3px 7px;
            font-size: 13px; font-family: inherit;
            border: 1.5px solid var(--accent); border-radius: 6px;
            background: var(--surface); color: var(--label);
            text-align: right; outline: none;
        }

        .change-pill {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 3px 8px; border-radius: 6px;
            font-size: 11px; font-weight: 600;
        }

        .change-up   { background: var(--green-bg); color: var(--green); }
        .change-down { background: var(--red-bg); color: var(--red); }
        .change-neu  { background: var(--surface2); color: var(--label2); }

        .pos { color: var(--green); }
        .neg { color: var(--red); }
        .neu { color: var(--label2); }

        .weight-bar {
            display: flex; align-items: center; gap: 8px;
        }

        .weight-track {
            width: 48px; height: 4px;
            background: var(--sep); border-radius: 2px; overflow: hidden;
        }

        .weight-fill {
            height: 100%; background: var(--accent); border-radius: 2px;
        }

        .row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
        tbody tr:hover .row-actions { opacity: 1; }

        .row-btn {
            padding: 3px 9px; font-size: 11px; font-weight: 500;
            border-radius: 6px; border: 1px solid var(--sep);
            background: var(--surface); color: var(--label2);
            cursor: pointer; transition: all .1s; font-family: inherit;
        }

        .row-btn:hover { color: var(--label); border-color: var(--label3); }
        .row-btn.del:hover { color: var(--red); border-color: var(--red); background: var(--red-bg); }
        .row-btn.buy:hover { color: var(--green); border-color: var(--green); background: var(--green-bg); }

        .buy-preview {
            background: var(--surface2);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 12px;
            color: var(--label2);
            margin-top: 4px;
        }
        /* ── Market breakdown row ── */
        .mkt-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        /* ── Filter chips ── */
        .filter-chips { display: flex; gap: 6px; flex-wrap: wrap; }
        .chip {
            padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
            border: 1.5px solid var(--sep); background: var(--surface2);
            color: var(--label2); cursor: pointer; font-family: inherit;
            transition: all .15s;
        }
        .chip.active { background: #111827; color: #fff; border-color: #111827; font-weight: 700; }
        .chip:hover:not(.active) { border-color: var(--label3); color: var(--label); background: var(--surface); }

        /* ── Performance bars ── */
        .perf-list { padding: 14px 20px 20px; display: flex; flex-direction: column; gap: 9px; }
        .perf-row  { display: flex; align-items: center; gap: 8px; }
        .perf-ticker { font-size: 11px; font-weight: 700; width: 42px; flex-shrink: 0; color: var(--label2); }
        .perf-bar-wrap { flex: 1; height: 5px; background: var(--sep); border-radius: 3px; overflow: hidden; }
        .perf-bar { height: 100%; border-radius: 3px; transition: width .4s; }
        .perf-bar.pos { background: var(--green); }
        .perf-bar.neg { background: var(--red); }
        .perf-pct { font-size: 11px; font-weight: 600; min-width: 56px; text-align: right; flex-shrink: 0; }

        /* ── Breakdown (Top Categories) ── */
        .breakdown-tabs { display: flex; gap: 4px; padding: 14px 16px 0; }
        .bk-tab {
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
            border: none; background: transparent; color: var(--label2);
            cursor: pointer; font-family: inherit; transition: all .15s;
        }
        .bk-tab.active { background: var(--surface2); color: var(--label); }
        .breakdown-list { padding: 4px 0 8px; }
        .bk-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 16px; border-bottom: 1px solid var(--sep);
        }
        .bk-row:last-child { border-bottom: none; }
        .bk-icon {
            width: 36px; height: 36px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0;
        }
        .bk-label { font-size: 11px; color: var(--label2); margin-bottom: 1px; }
        .bk-value { font-size: 14px; font-weight: 700; }
        .bk-right { margin-left: auto; text-align: right; }
        .bk-gain  { font-size: 12px; font-weight: 600; }

        /* ── Right column ── */
        .right-col { display: flex; flex-direction: column; gap: 20px; }

        .skel {
            display: inline-block; border-radius: 4px;
            background: linear-gradient(90deg, var(--surface2) 25%, var(--sep) 50%, var(--surface2) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
        }
        @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

        /* ── Empty State ── */
        .empty {
            text-align: center; padding: 60px 20px;
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.3; }
        .empty h3 { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .empty p { font-size: 13px; color: var(--label2); margin-bottom: 20px; }

        /* ── Chart Card ── */
        .chart-inner { padding: 20px; }

        .donut-wrap {
            position: relative;
            width: 160px; height: 160px;
            margin: 0 auto 20px;
        }

        .donut-ring {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
        }

        .donut-hole {
            position: absolute;
            width: 96px; height: 96px;
            background: var(--surface);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .donut-total {
            font-size: 13px; font-weight: 700;
            letter-spacing: -0.5px;
        }

        .donut-label {
            font-size: 10px; color: var(--label2); margin-top: 1px;
        }

        .alloc-list { display: flex; flex-direction: column; gap: 10px; }

        .alloc-row {
            display: flex; align-items: center; justify-content: space-between;
        }

        .alloc-left { display: flex; align-items: center; gap: 8px; }

        .alloc-dot {
            width: 10px; height: 10px;
            border-radius: 3px;
        }

        .alloc-market { font-size: 13px; font-weight: 600; }
        .alloc-pct    { font-size: 12px; color: var(--label2); }

        .alloc-bar-wrap {
            flex: 1; margin: 0 12px;
            height: 4px; background: var(--sep); border-radius: 2px; overflow: hidden;
        }

        .alloc-bar { height: 100%; border-radius: 2px; }
        .alloc-value { font-size: 12px; font-weight: 600; min-width: 60px; text-align: right; }

        .fx-note {
            font-size: 11px;
            color: var(--label3);
            text-align: center;
            padding: 12px 20px;
            border-top: 1px solid var(--sep);
        }

        /* ── Modal ── */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 100; align-items: center; justify-content: center;
        }
        .overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 20px;
            padding: 28px;
            width: 100%; max-width: 440px; margin: 20px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.25);
        }

        .modal-hdr {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 22px;
        }

        .modal-hdr h2 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

        .modal-x {
            width: 30px; height: 30px; border-radius: 50%;
            background: var(--surface2); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--label2); line-height: 1;
        }

        .fg { margin-bottom: 14px; }

        .fg label {
            display: block; font-size: 11px; font-weight: 700;
            color: var(--label2); text-transform: uppercase;
            letter-spacing: 0.5px; margin-bottom: 6px;
        }

        .frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .finput {
            width: 100%; padding: 10px 13px;
            background: var(--surface2); border: 1.5px solid var(--sep);
            border-radius: var(--radius-sm);
            font-size: 14px; color: var(--label);
            font-family: inherit; outline: none;
            transition: border-color .15s;
            appearance: none;
        }

        .finput:focus { border-color: var(--accent); background: var(--surface); }

        .modal-foot { display: flex; gap: 8px; margin-top: 22px; }
        .modal-foot .btn { flex: 1; justify-content: center; }

        /* ── Buttons ── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 10px 16px; border-radius: var(--radius-sm);
            font-size: 14px; font-weight: 600;
            cursor: pointer; border: none;
            transition: opacity .15s, transform .1s;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--accent); color: #111827; font-weight: 700; }
        .btn-primary:hover { opacity: 0.88; }
        .btn-secondary { background: var(--surface2); color: var(--label); border: 1.5px solid var(--sep); }

        /* ── Lock Screen ── */
        .lock-screen {
            position: fixed; inset: 0;
            background: var(--bg);
            z-index: 999;
            display: flex; align-items: center; justify-content: center;
        }

        .lock-card {
            background: #ffffff;
            border: 1px solid var(--sep);
            border-radius: 24px;
            padding: 40px 36px;
            width: 100%; max-width: 360px;
            margin: 20px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
        }

        .lock-brand {
            width: 52px; height: 52px;
            background: #111827;
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 800; color: var(--accent);
            margin: 0 auto 18px;
        }

        .lock-card h2 {
            font-size: 20px; font-weight: 700;
            color: var(--label); letter-spacing: -0.4px;
            margin-bottom: 6px;
        }

        .lock-card p {
            font-size: 13px; color: var(--label2);
            margin-bottom: 24px;
        }

        .lock-input {
            width: 100%; padding: 12px 16px;
            background: var(--surface2);
            border: 1.5px solid var(--sep);
            border-radius: var(--radius-sm);
            font-size: 16px; color: var(--label);
            font-family: inherit; outline: none;
            text-align: center; letter-spacing: 4px;
            margin-bottom: 12px;
            transition: border-color .15s;
        }

        .lock-input:focus { border-color: var(--accent); }
        .lock-input::placeholder { letter-spacing: 0; color: var(--label3); }

        .lock-btn {
            width: 100%; padding: 12px;
            background: var(--accent); color: #111827;
            border: none; border-radius: var(--radius-sm);
            font-size: 15px; font-weight: 700;
            cursor: pointer; font-family: inherit;
            transition: opacity .15s;
        }
        .lock-btn:hover { opacity: 0.88; }

        .lock-error {
            font-size: 12px; color: var(--red);
            margin-top: 10px; opacity: 0;
            transition: opacity .2s;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-6px); }
            40%,80%  { transform: translateX(6px); }
        }
        .shake { animation: shake .4s ease; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--label); color: var(--bg);
            padding: 10px 20px; border-radius: 24px;
            font-size: 13px; font-weight: 500;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
            transition: transform .3s cubic-bezier(.175,.885,.32,1.275);
            z-index: 200; white-space: nowrap; pointer-events: none;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Responsive ── */
        @media (max-width: 1100px) {
            .content-grid { grid-template-columns: 1fr; }
            .right-col { display: none; }
        }
        @media (max-width: 900px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 680px) {
            :root { --sidebar-w: 0px; }
            .sidebar { display: none; }
            .main { padding: 20px 16px 40px; }
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            .card { overflow-x: auto; }
            table { min-width: 640px; }
            .weight-track { display: none; }
        }
    </style>
</head>
<body>

<script>
// ── Auth ──
const PWD_HASH = '729d868e3527e325418372aa1ccf25065973902dd6f3e782d6d54106454ad9ee';

async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

document.getElementById('lock-form').addEventListener('submit', async e => {
    e.preventDefault();
    const pwd = document.getElementById('lock-pwd').value;
    const hash = await sha256(pwd);
    if (hash === PWD_HASH) {
        sessionStorage.setItem('portfolio_auth', '1');
        document.getElementById('lock-screen').style.display = 'none';
        init();
    } else {
        const input = document.getElementById('lock-pwd');
        const err   = document.getElementById('lock-error');
        input.classList.add('shake');
        err.style.opacity = '1';
        input.value = '';
        input.focus();
        setTimeout(() => { input.classList.remove('shake'); err.style.opacity = '0'; }, 1200);
    }
});

// ── Constants ──
const KEY = 'portfolio_v1';
const MARKET_COLORS = { US: '#3b82f6', SG: '#f59e0b', UK: '#8b5cf6' };

// ── State ──
let holdings = [];
let prices   = {};
let fxSGDUSD = 0.74;
let fxGBPUSD = 1.27;
let editId   = null;
let tab      = 'all';
let typeFilter = 'all';
let bkTab    = 'type';
let fetching = false;

// ── Storage ──
function load() {
    try { holdings = JSON.parse(localStorage.getItem(KEY) || '[]'); }
    catch { holdings = []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(holdings)); }
function uid()  { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

// ── Greeting ──
function setGreeting() {
    const h = new Date().getHours();
    const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').innerHTML =
        `<span style="display:block;font-size:13px;font-weight:400;color:var(--label3);letter-spacing:0;margin-bottom:2px">${g}</span>Investment Portfolio`;
    const d = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
    document.getElementById('greeting-sub').textContent = d;
}

// ── Price Fetching ──
const PROXIES = [
    u => u,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
];

async function fetchSymbol(symbol) {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=1d`;
    for (const proxy of PROXIES) {
        try {
            const res = await fetch(proxy(url), { credentials: 'include', headers: { Accept: 'application/json' } });
            if (!res.ok) continue;
            const data = await res.json();
            const meta = data?.chart?.result?.[0]?.meta;
            if (meta?.regularMarketPrice) return { symbol, meta };
        } catch {}
    }
    return null;
}

async function fetchPrices() {
    if (!holdings.length || fetching) return;
    fetching = true;
    const icon = document.getElementById('refresh-icon');
    icon.classList.add('spinning');
    document.getElementById('last-updated').textContent = 'Updating…';

    const tickers    = [...new Set(holdings.map(h => h.ticker))];
    const allSymbols = [...tickers, 'SGDUSD=X', 'GBPUSD=X'];

    try {
        const results = await Promise.all(allSymbols.map(fetchSymbol));

        results.forEach(r => {
            if (!r) return;
            const { symbol, meta } = r;
            if (symbol === 'SGDUSD=X') {
                fxSGDUSD = meta.regularMarketPrice || fxSGDUSD;
            } else if (symbol === 'GBPUSD=X') {
                fxGBPUSD = meta.regularMarketPrice || fxGBPUSD;
            } else {
                const isPence = meta.currency === 'GBp';
                prices[symbol] = {
                    price:     isPence ? meta.regularMarketPrice / 100 : meta.regularMarketPrice,
                    change:    isPence ? (meta.regularMarketChange ?? 0) / 100 : (meta.regularMarketChange ?? 0),
                    changePct: meta.regularMarketChangePercent ?? null,
                    currency:  isPence ? 'GBP' : meta.currency,
                    state:     meta.marketState,
                };
            }
        });

        if (!Object.keys(prices).length) throw new Error('no prices');

        const t = new Date();
        document.getElementById('last-updated').textContent =
            `Updated ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
        document.getElementById('fx-note').textContent =
            `1 SGD = ${fxSGDUSD.toFixed(4)} USD · 1 GBP = ${fxGBPUSD.toFixed(4)} USD`;

    } catch {
        document.getElementById('last-updated').textContent = 'Price update failed';
    } finally {
        fetching = false;
        icon.classList.remove('spinning');
        render();
    }
}

// ── Calculations ──
function enrich(h) {
    const p         = prices[h.ticker];
    const price     = h.manualPrice != null ? h.manualPrice : (p?.price ?? null);
    const changePct = h.manualPrice != null ? null : (p?.changePct ?? null);
    const costBasis = h.avgCost * h.shares;
    const value     = price !== null ? price * h.shares : null;
    const gainLoss  = value !== null ? value - costBasis : null;
    const gainPct   = gainLoss !== null && costBasis > 0 ? (gainLoss / costBasis) * 100 : null;
    const dayChange = h.manualPrice != null ? null : (p?.change != null ? p.change * h.shares : null);
    return { ...h, price, changePct, costBasis, value, gainLoss, gainPct, dayChange };
}

function toUSD(v, currency) {
    if (currency === 'SGD') return v * fxSGDUSD;
    if (currency === 'GBP') return v * fxGBPUSD;
    return v;
}

function totalUSDof(rows) {
    return rows.reduce((s, r) => s + toUSD(r.value ?? r.costBasis, r.currency), 0);
}

function calcSummary(rows) {
    const val = r => r.value ?? r.costBasis;
    const byMkt = { US: 0, SG: 0, UK: 0 };
    const costByMkt = { US: 0, SG: 0, UK: 0 };

    rows.forEach(r => {
        byMkt[r.market]    = (byMkt[r.market]    || 0) + toUSD(val(r), r.currency);
        costByMkt[r.market] = (costByMkt[r.market] || 0) + toUSD(r.costBasis, r.currency);
    });

    const totalUSD     = Object.values(byMkt).reduce((s, v) => s + v, 0);
    const totalCostUSD = Object.values(costByMkt).reduce((s, v) => s + v, 0);
    const totalGain    = totalUSD - totalCostUSD;
    const totalGainPct = totalCostUSD > 0 ? (totalGain / totalCostUSD) * 100 : 0;
    const dayUSD       = rows.reduce((s, r) => {
        if (r.dayChange == null) return s;
        return s + toUSD(r.dayChange, r.currency);
    }, 0);

    return { byMkt, costByMkt, totalUSD, totalCostUSD, totalGain, totalGainPct, dayUSD };
}

// ── Formatting ──
function money(v, cur) {
    if (v == null) return '—';
    const n = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (cur === 'SGD') return `S$${n}`;
    if (cur === 'GBP') return `£${n}`;
    return `$${n}`;
}
function signed(v, cur) {
    if (v == null) return '—';
    return (v >= 0 ? '+' : '−') + money(Math.abs(v), cur);
}
function pct(v) {
    if (v == null) return '—';
    return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}
function cc(v) { return v == null ? 'neu' : v > 0 ? 'pos' : v < 0 ? 'neg' : 'neu'; }
function badgeClass(v) { return v == null ? 'neu' : v > 0 ? 'up' : v < 0 ? 'down' : 'neu'; }

// ── Render ──
function render() {
    const all      = holdings.map(enrich);
    const byTab    = tab === 'all' ? all : all.filter(r => r.market === tab);
    const filtered = typeFilter === 'all' ? byTab : byTab.filter(r => r.type === typeFilter);
    const tot      = totalUSDof(all);

    renderKPI(all);
    renderMarkets(all);
    renderTypeChips(all);
    renderTable(filtered, tot);
    renderChart(all, tot);
    renderPerformance(all);
    renderBreakdown(all);
}

function renderKPI(rows) {
    const el = document.getElementById('kpi-grid');
    if (!rows.length) { el.innerHTML = ''; return; }
    const s = calcSummary(rows);

    const kpiCard = (cls, icon, label, value, badge, sub) => `
        <div class="kpi-card ${cls}">
            <div class="kpi-icon ${cls}">${icon}</div>
            <div class="kpi-label">${label}</div>
            <div class="kpi-value">${value}</div>
            <div>
                <span class="kpi-badge ${badge.cls}">${badge.text}</span>
                ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
            </div>
        </div>`;

    el.innerHTML =
        kpiCard('total', '💼', 'Total Portfolio',
            money(s.totalUSD, 'USD'),
            { cls: badgeClass(s.totalGain), text: `${s.totalGain >= 0 ? '▲' : '▼'} ${pct(s.totalGainPct)}` },
            `${money(s.totalUSD / fxSGDUSD, 'SGD')} · Cost: ${money(s.totalCostUSD, 'USD')}`) +

        kpiCard('blue', '💰', 'Unrealised Gain',
            signed(s.totalGain, 'USD'),
            { cls: badgeClass(s.totalGainPct), text: pct(s.totalGainPct) },
            `${signed(s.totalGain / fxSGDUSD, 'SGD')}`) +

        `<div class="kpi-card">
            <div class="kpi-icon green">🗂</div>
            <div class="kpi-label">Holdings</div>
            <div class="kpi-value">${rows.length}</div>
            <div>
                ${[...new Set(rows.map(r=>r.market))].map(m =>
                    `<span class="mkt-pill mkt-${m.toLowerCase()}">${m}</span>`
                ).join(' ')}
            </div>
        </div>`;
}

function renderTable(rows, tot) {
    document.getElementById('count').textContent =
        rows.length === 1 ? '1 holding' : `${rows.length} holdings`;

    const body = document.getElementById('table-body');

    if (!rows.length) {
        body.innerHTML = `
            <div class="empty">
                <div class="empty-icon">📊</div>
                <h3>No holdings ${tab !== 'all' ? 'in ' + tab + ' market' : 'yet'}</h3>
                <p>${tab !== 'all' ? 'Switch to All to see your full portfolio.' : 'Add your first stock or ETF to get started.'}</p>
                ${tab === 'all' ? `<button class="btn btn-primary" onclick="openModal()">+ Add Holding</button>` : ''}
            </div>`;
        return;
    }

    body.innerHTML = `
        <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
        <table>
            <thead>
                <tr>
                    <th>Holding</th>
                    <th>Market</th>
                    <th class="r">Shares</th>
                    <th class="r">Avg Cost</th>
                    <th class="r">Price</th>
                    <th class="r">Value</th>
                    <th class="r">Gain / Loss</th>
                    <th class="r">Weight</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>${rows.map(r => tableRow(r, tot)).join('')}</tbody>
        </table>
        </div>`;
}

function tableRow(r, tot) {
    const valueUSD = toUSD(r.value ?? r.costBasis, r.currency);
    const wt = tot > 0 ? (valueUSD / tot) * 100 : 0;
    const short = r.ticker.replace('.SI','').replace('.L','');

    const isManual  = r.manualPrice != null;
    const priceCell = r.price != null
        ? `<span class="price-cell" data-id="${r.id}">${money(r.price, r.currency)}${isManual ? '<span class="manual-tag">M</span>' : ''}</span>`
        : `<span class="price-cell" data-id="${r.id}"><span class="skel" style="width:54px;height:13px;display:inline-block"></span></span>`;

    const valueCell = r.value != null
        ? money(r.value, r.currency)
        : `<span style="color:var(--label3)">${money(r.costBasis, r.currency)}</span>`;

    const gainCell = r.gainLoss != null
        ? `<span class="${cc(r.gainLoss)}">${signed(r.gainLoss, r.currency)}<br>
           <small style="font-size:11px;color:var(--label2)">${pct(r.gainPct)}</small></span>`
        : '<span class="neu">—</span>';

    const dayCell = r.changePct != null
        ? `<span class="change-pill change-${r.changePct >= 0 ? 'up' : 'down'}">${r.changePct >= 0 ? '▲' : '▼'} ${Math.abs(r.changePct).toFixed(2)}%</span>`
        : '<span style="color:var(--label3)">—</span>';

    return `
        <tr>
            <td>
                <div class="ticker-wrap">
                    <div class="ticker-avatar">${short.slice(0,4)}</div>
                    <div>
                        <div class="ticker-name">${r.name}</div>
                        <div class="ticker-meta">${r.type}${r.notes ? ' · ' + r.notes : ''}</div>
                    </div>
                </div>
            </td>
            <td><span class="mkt-pill mkt-${r.market.toLowerCase()}">${r.market}</span></td>
            <td class="r">${Number(r.shares).toLocaleString('en-US', { maximumFractionDigits: 4 })}</td>
            <td class="r">${money(r.avgCost, r.currency)}</td>
            <td class="r">${priceCell}</td>
            <td class="r"><strong>${valueCell}</strong></td>
            <td class="r">${gainCell}</td>
            <td class="r">
                <div class="weight-bar">
                    <div class="weight-track"><div class="weight-fill" style="width:${Math.min(wt,100).toFixed(1)}%"></div></div>
                    <span>${wt.toFixed(1)}%</span>
                </div>
            </td>
            <td>
                <div class="row-actions">
                    <button class="row-btn buy" onclick="openBuyModal('${r.id}')">Buy</button>
                    <button class="row-btn" onclick="openModal('${r.id}')">Edit</button>
                    <button class="row-btn del" onclick="del('${r.id}')">Remove</button>
                </div>
            </td>
        </tr>`;
}

function renderChart(rows, tot) {
    const body = document.getElementById('chart-body');
    if (!rows.length) { body.innerHTML = '<div class="chart-inner"><div class="empty"><div class="empty-icon">🥧</div><p>Add holdings to see allocation</p></div></div>'; return; }

    const byMkt = {};
    rows.forEach(r => {
        const v = toUSD(r.value ?? r.costBasis, r.currency);
        byMkt[r.market] = (byMkt[r.market] || 0) + v;
    });

    const markets = Object.entries(byMkt).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    const total = markets.reduce((s, [, v]) => s + v, 0);

    // Build conic-gradient for donut
    let angle = 0;
    const stops = markets.map(([mkt, v]) => {
        const deg = (v / total) * 360;
        const stop = `${MARKET_COLORS[mkt] || '#94a3b8'} ${angle.toFixed(1)}deg ${(angle + deg).toFixed(1)}deg`;
        angle += deg;
        return stop;
    });

    // Add a gap between segments visually by slightly shrinking each arc
    const gradient = stops.length > 1
        ? `conic-gradient(${stops.join(', ')})`
        : `conic-gradient(${MARKET_COLORS[markets[0][0]]} 0deg 360deg)`;

    const allocationRows = markets.map(([mkt, v]) => {
        const p = (v / total) * 100;
        return `
            <div class="alloc-row">
                <div class="alloc-left">
                    <div class="alloc-dot" style="background:${MARKET_COLORS[mkt] || '#94a3b8'}"></div>
                    <span class="alloc-market">${mkt}</span>
                </div>
                <div class="alloc-bar-wrap">
                    <div class="alloc-bar" style="width:${p.toFixed(1)}%;background:${MARKET_COLORS[mkt] || '#94a3b8'}"></div>
                </div>
                <span class="alloc-pct">${p.toFixed(1)}%</span>
            </div>`;
    }).join('');

    body.innerHTML = `
        <div class="chart-inner">
            <div class="donut-wrap">
                <div class="donut-ring" style="background:${gradient}"></div>
                <div class="donut-hole">
                    <div class="donut-total">${money(total, 'USD')}</div>
                    <div class="donut-label">Total USD</div>
                </div>
            </div>
            <div class="alloc-list">${allocationRows}</div>
        </div>`;
}

// ── Market KPI breakdown ──
function renderMarkets(rows) {
    const el = document.getElementById('mkt-grid');
    if (!rows.length) { el.innerHTML = ''; return; }
    const s = calcSummary(rows);
    const mkts = [['US','USD',1], ['SG','SGD',1/fxSGDUSD]];
    el.innerHTML = mkts.map(([mkt, cur, fx]) => {
        const val  = (s.byMkt[mkt]  || 0) * fx;
        const cost = (s.costByMkt[mkt] || 0) * fx;
        const gain = val - cost;
        const gPct = cost > 0 ? (gain / cost) * 100 : 0;
        const col  = MARKET_COLORS[mkt];

        const mktRows = rows.filter(r => r.market === mkt);
        const maxV = Math.max(...mktRows.map(r => r.value ?? r.costBasis), 0.01);
        const barW = 10, gap = 5, chartH = 40;
        const bars = mktRows.map((r, i) => {
            const v = r.value ?? r.costBasis;
            const barH = Math.max(Math.round((v / maxV) * chartH), 3);
            const barCol = (r.gainLoss ?? 0) >= 0 ? '#22c55e' : '#ef4444';
            const x = i * (barW + gap);
            const short = r.ticker.replace('.SI','').replace('.L','');
            return `<g><rect x="${x}" y="${chartH - barH}" width="${barW}" height="${barH}" rx="2" fill="${barCol}" opacity="0.8"/><title>${short}: ${money(r.value ?? r.costBasis, r.currency)}</title></g>`;
        }).join('');
        const svgW = Math.max(mktRows.length * (barW + gap) - gap, 10);

        return `
        <div class="kpi-card">
            <div class="kpi-icon" style="background:${col}18">
                <span class="mkt-pill mkt-${mkt.toLowerCase()}">${mkt}</span>
            </div>
            <div class="kpi-label">${mkt} Holdings</div>
            <div class="kpi-value" style="font-size:22px">${money(val, cur)}</div>
            <div>
                <span class="kpi-badge ${badgeClass(gain)}">${signed(gain, cur)} · ${pct(gPct)}</span>
                <div class="kpi-sub">Cost: ${money(cost, cur)}</div>
            </div>
            ${mktRows.length ? `<svg width="${svgW}" height="${chartH}" viewBox="0 0 ${svgW} ${chartH}" style="margin-top:14px;display:block">${bars}</svg>` : ''}
        </div>`;
    }).join('');
}

// ── Type filter chips ──
function renderTypeChips(rows) {
    const types = ['all', ...new Set(rows.map(r => r.type))].filter(Boolean);
    const el = document.getElementById('type-chips');
    el.innerHTML = types.map(t => `
        <button class="chip ${typeFilter === t ? 'active' : ''}" data-type="${t}">
            ${t === 'all' ? 'All' : t}
        </button>`).join('');
    el.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
            typeFilter = btn.dataset.type;
            render();
        });
    });
}

// ── Performance bars ──
function renderPerformance(rows) {
    const el = document.getElementById('perf-body');
    if (!rows.length) { el.innerHTML = '<div class="chart-inner"><div class="empty"><div class="empty-icon">📉</div><p>No data yet</p></div></div>'; return; }
    const sorted = [...rows].filter(r => r.gainPct != null).sort((a, b) => b.gainPct - a.gainPct);
    const maxAbs = Math.max(...sorted.map(r => Math.abs(r.gainPct)), 1);
    el.innerHTML = `<div class="perf-list">${sorted.map(r => {
        const w = (Math.abs(r.gainPct) / maxAbs * 100).toFixed(1);
        const cls = r.gainPct >= 0 ? 'pos' : 'neg';
        const short = r.ticker.replace('.SI','').replace('.L','');
        return `
        <div class="perf-row">
            <span class="perf-ticker">${short.slice(0,5)}</span>
            <div class="perf-bar-wrap"><div class="perf-bar ${cls}" style="width:${w}%"></div></div>
            <span class="perf-pct ${cls}">${pct(r.gainPct)}</span>
        </div>`;
    }).join('')}</div>`;
}

// ── Breakdown by type / market ──
const BK_ICONS = {
    Stock: { icon: '📈', bg: 'rgba(59,130,246,0.1)' },
    ETF:   { icon: '🗂', bg: 'rgba(34,197,94,0.1)' },
    REIT:  { icon: '🏢', bg: 'rgba(245,158,11,0.1)' },
    US:    { icon: '🇺🇸', bg: 'rgba(59,130,246,0.1)' },
    SG:    { icon: '🇸🇬', bg: 'rgba(245,158,11,0.1)' },
    UK:    { icon: '🇬🇧', bg: 'rgba(139,92,246,0.1)' },
};

function renderBreakdown(rows) {
    const el = document.getElementById('bk-body');
    if (!rows.length) { el.innerHTML = ''; return; }

    const groups = {};
    rows.forEach(r => {
        const key = bkTab === 'type' ? r.type : r.market;
        // Type view: convert all to USD for fair comparison
        // Market view: sum native currency values (US→USD, SG→SGD, UK→GBP)
        const v    = r.value ?? r.costBasis;
        const val  = bkTab === 'type' ? toUSD(v, r.currency)         : v;
        const cost = bkTab === 'type' ? toUSD(r.costBasis, r.currency) : r.costBasis;
        const cur  = bkTab === 'type' ? 'USD' : r.currency;
        if (!groups[key]) groups[key] = { val: 0, cost: 0, cur };
        groups[key].val  += val;
        groups[key].cost += cost;
    });

    const entries = Object.entries(groups).sort((a, b) => b[1].val - a[1].val);
    el.innerHTML = `<div class="breakdown-list">${entries.map(([key, g]) => {
        const gain = g.val - g.cost;
        const gPct = g.cost > 0 ? (gain / g.cost) * 100 : 0;
        const meta = BK_ICONS[key] || { icon: '📊', bg: 'rgba(148,163,184,0.1)' };
        return `
        <div class="bk-row">
            <div class="bk-icon" style="background:${meta.bg}">${meta.icon}</div>
            <div>
                <div class="bk-label">${key}</div>
                <div class="bk-value">${money(g.val, g.cur)}</div>
            </div>
            <div class="bk-right">
                <div class="bk-gain ${cc(gain)}">${signed(gain, g.cur)}</div>
                <div style="font-size:11px;color:var(--label3)">${pct(gPct)}</div>
            </div>
        </div>`;
    }).join('')}</div>`;
}

// ── Modal ──
function openModal(id = null) {
    editId = id;
    document.getElementById('modal-title').textContent = id ? 'Edit Holding' : 'Add Holding';
    document.getElementById('modal-save').textContent  = id ? 'Save Changes' : 'Add Holding';

    if (id) {
        const h = holdings.find(x => x.id === id);
        if (!h) return;
        document.getElementById('f-ticker').value   = h.ticker;
        document.getElementById('f-market').value   = h.market;
        document.getElementById('f-name').value     = h.name;
        document.getElementById('f-type').value     = h.type;
        document.getElementById('f-currency').value = h.currency;
        document.getElementById('f-shares').value   = h.shares;
        document.getElementById('f-avgcost').value  = h.avgCost;
        document.getElementById('f-notes').value    = h.notes || '';
    } else {
        document.getElementById('hform').reset();
    }

    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('f-ticker').focus(), 50);
}

function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    editId = null;
}

function del(id) {
    if (!confirm('Remove this holding?')) return;
    holdings = holdings.filter(h => h.id !== id);
    save(); render(); toast('Holding removed');
}

// ── Form Submit ──
document.getElementById('hform').addEventListener('submit', e => {
    e.preventDefault();
    let ticker   = document.getElementById('f-ticker').value.trim().toUpperCase();
    const market   = document.getElementById('f-market').value;
    const name     = document.getElementById('f-name').value.trim();
    const type     = document.getElementById('f-type').value;
    const currency = document.getElementById('f-currency').value;
    const shares   = parseFloat(document.getElementById('f-shares').value);
    const avgCost  = parseFloat(document.getElementById('f-avgcost').value);
    const notes    = document.getElementById('f-notes').value.trim();

    if (market === 'SG' && !ticker.endsWith('.SI')) ticker += '.SI';
    if (market === 'UK' && !ticker.endsWith('.L'))  ticker += '.L';

    if (!ticker || !name || isNaN(shares) || isNaN(avgCost)) return;

    if (editId) {
        const i = holdings.findIndex(h => h.id === editId);
        if (i !== -1) holdings[i] = { ...holdings[i], ticker, market, name, type, currency, shares, avgCost, notes };
        toast('Holding updated');
    } else {
        holdings.push({ id: uid(), ticker, market, name, type, currency, shares, avgCost, notes });
        toast('Holding added');
    }

    save(); closeModal(); fetchPrices();
});

// ── Events ──
document.getElementById('add-btn').addEventListener('click', () => openModal());
document.getElementById('refresh-btn').addEventListener('click', fetchPrices);
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

document.getElementById('f-market').addEventListener('change', e => {
    const cur = { SG: 'SGD', UK: 'GBP', US: 'USD' };
    document.getElementById('f-currency').value = cur[e.target.value] || 'USD';
});

document.getElementById('f-ticker').addEventListener('input', e => {
    const s = e.target.selectionStart;
    e.target.value = e.target.value.toUpperCase();
    e.target.setSelectionRange(s, s);
});

document.getElementById('bk-tabs').addEventListener('click', e => {
    const btn = e.target.closest('.bk-tab');
    if (!btn) return;
    document.querySelectorAll('.bk-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bkTab = btn.dataset.bk;
    render();
});

document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
        tab = btn.dataset.tab;
        const titles = { all: 'All Holdings', US: 'US Holdings', SG: 'SG Holdings', UK: 'UK Holdings' };
        document.getElementById('table-title').textContent = titles[tab];
        render();
    });
});

// ── Toast ──
let toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Export / Import ──
document.getElementById('export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(holdings, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'portfolio.json';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Holdings exported');
});

document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('import-file').click();
});

document.getElementById('import-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const data = JSON.parse(ev.target.result);
            if (!Array.isArray(data)) throw new Error('invalid');
            holdings = data;
            save();
            render();
            fetchPrices();
            toast(`Imported ${holdings.length} holdings`);
        } catch {
            toast('Invalid file — expected portfolio.json');
        }
    };
    reader.readAsText(file);
    e.target.value = '';
});

// ── Inline Price Editing ──
document.getElementById('table-body').addEventListener('click', e => {
    const cell = e.target.closest('.price-cell');
    if (!cell) return;
    const id = cell.dataset.id;
    const h = holdings.find(x => x.id === id);
    if (!h) return;

    const input = document.createElement('input');
    input.type = 'number';
    input.step = 'any';
    input.value = h.manualPrice ?? '';
    input.placeholder = 'price';
    input.className = 'price-inline-input';
    cell.innerHTML = '';
    cell.appendChild(input);
    input.focus();
    input.select();

    let committed = false;
    const commit = () => {
        if (committed) return;
        committed = true;
        const i = holdings.findIndex(x => x.id === id);
        if (i === -1) { render(); return; }
        const val = parseFloat(input.value);
        if (!isNaN(val) && val > 0) {
            holdings[i] = { ...holdings[i], manualPrice: val };
            save();
            toast('Price updated');
        } else if (input.value.trim() === '') {
            holdings[i] = { ...holdings[i], manualPrice: null };
            save();
        }
        render();
    };
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') commit();
        if (e.key === 'Escape') { committed = true; render(); }
    });
    input.addEventListener('blur', commit);
});

// ── Buy More ──
let buyId = null;

function openBuyModal(id) {
    buyId = id;
    const h = holdings.find(x => x.id === id);
    if (!h) return;
    document.getElementById('buy-modal-title').textContent = `Buy More · ${h.name}`;
    document.getElementById('buy-holding-info').innerHTML =
        `<strong>${h.ticker}</strong> &nbsp;·&nbsp; ${Number(h.shares).toLocaleString()} shares &nbsp;·&nbsp; avg cost ${money(h.avgCost, h.currency)}`;
    document.getElementById('buy-shares').value = '';
    document.getElementById('buy-price').value = '';
    document.getElementById('buy-preview').innerHTML = '';
    document.getElementById('buy-overlay').classList.add('open');
    setTimeout(() => document.getElementById('buy-shares').focus(), 50);
}

function updateBuyPreview() {
    if (!buyId) return;
    const h = holdings.find(x => x.id === buyId);
    const newShares = parseFloat(document.getElementById('buy-shares').value);
    const newPrice  = parseFloat(document.getElementById('buy-price').value);
    if (!h || isNaN(newShares) || isNaN(newPrice) || newShares <= 0 || newPrice <= 0) {
        document.getElementById('buy-preview').innerHTML = '';
        return;
    }
    const totalShares = h.shares + newShares;
    const newAvgCost  = (h.shares * h.avgCost + newShares * newPrice) / totalShares;
    document.getElementById('buy-preview').innerHTML = `
        <div class="buy-preview">
            New total: <strong style="color:var(--label)">${totalShares.toLocaleString('en-US', { maximumFractionDigits: 4 })} shares</strong>
            &nbsp;·&nbsp; New avg cost: <strong style="color:var(--label)">${money(newAvgCost, h.currency)}</strong>
        </div>`;
}

document.getElementById('buy-shares').addEventListener('input', updateBuyPreview);
document.getElementById('buy-price').addEventListener('input', updateBuyPreview);

document.getElementById('buy-form').addEventListener('submit', e => {
    e.preventDefault();
    if (!buyId) return;
    const i = holdings.findIndex(x => x.id === buyId);
    if (i === -1) return;
    const h = holdings[i];
    const newShares = parseFloat(document.getElementById('buy-shares').value);
    const newPrice  = parseFloat(document.getElementById('buy-price').value);
    if (isNaN(newShares) || isNaN(newPrice)) return;
    const totalShares = h.shares + newShares;
    const newAvgCost  = (h.shares * h.avgCost + newShares * newPrice) / totalShares;
    holdings[i] = { ...h, shares: totalShares, avgCost: newAvgCost };
    save();
    document.getElementById('buy-overlay').classList.remove('open');
    buyId = null;
    render();
    fetchPrices();
    toast('Position updated');
});

const closeBuyModal = () => { document.getElementById('buy-overlay').classList.remove('open'); buyId = null; };
document.getElementById('buy-modal-close').addEventListener('click', closeBuyModal);
document.getElementById('buy-cancel').addEventListener('click', closeBuyModal);
document.getElementById('buy-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeBuyModal(); });

// ── Init ──
function init() {
    load();
    setGreeting();
    render();
    fetchPrices();
    setInterval(fetchPrices, 60_000);
}

if (sessionStorage.getItem('portfolio_auth') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    init();
} else {
    setTimeout(() => document.getElementById('lock-pwd').focus(), 100);
}
</script>
